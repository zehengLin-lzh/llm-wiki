<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal LLM Wiki</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <header id="status-bar">
            <span class="logo">&gt; Personal LLM Wiki</span>
            <span id="machine-name">...</span>
            <span id="wiki-stats" class="badge">...</span>
            <span id="provider-badge" class="badge">...</span>
        </header>
        <main id="content">
            <!-- Left sidebar: Wiki Browser -->
            <aside id="wiki-sidebar">
                <div id="wiki-header">
                    <h3>&gt; Wiki</h3>
                    <button id="wiki-refresh-btn" class="btn-sm" title="Refresh">R</button>
                </div>
                <div id="wiki-tree"></div>
            </aside>

            <!-- Center: Chat -->
            <div id="chat-panel">
                <div id="chat-messages"></div>
                <div id="chat-input-area">
                    <input type="text" id="chat-input" placeholder="Ask your wiki..." />
                    <button id="chat-send-btn" class="btn">Send</button>
                </div>
            </div>

            <!-- Right sidebar: Tabs (Ingest / Settings) -->
            <aside id="right-sidebar">
                <div id="right-tabs">
                    <button class="tab-btn active" data-tab="tab-ingest">Ingest</button>
                    <button class="tab-btn" data-tab="tab-settings">Settings</button>
                </div>

                <!-- Ingest Tab -->
                <div id="tab-ingest" class="tab-content active">
                    <div id="drop-zone">
                        <p>Drop files here</p>
                        <p class="drop-hint">PDF, Markdown, Text</p>
                    </div>
                    <div id="url-ingest">
                        <input type="text" id="url-input" placeholder="Paste URL..." />
                        <select id="subdir-select">
                            <option value="personal">personal</option>
                            <option value="work">work</option>
                            <option value="shared">shared</option>
                        </select>
                        <button id="ingest-url-btn" class="btn">Go</button>
                    </div>
                    <div id="ingest-status" class="hidden"></div>
                    <div id="ingest-history">
                        <h4>&gt; Recent</h4>
                        <div id="ingest-list"></div>
                    </div>
                </div>

                <!-- Settings Tab -->
                <div id="tab-settings" class="tab-content">
                    <div id="settings-provider">
                        <h4>&gt; Active Provider</h4>
                        <div id="provider-radios">
                            <label class="radio-label">
                                <input type="radio" name="provider" value="claude"> claude
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="provider" value="ollama"> ollama
                            </label>
                        </div>
                        <div id="provider-list"></div>
                    </div>
                    <div id="model-selectors">
                        <h4>&gt; Models</h4>
                        <div class="model-row">
                            <span class="model-label">Claude:</span>
                            <select id="claude-model-select" class="model-select"></select>
                        </div>
                        <div class="model-row">
                            <span class="model-label">Ollama:</span>
                            <select id="ollama-model-select" class="model-select"></select>
                        </div>
                    </div>
                    <button id="test-llm-btn" class="btn">Test Provider</button>
                    <div id="test-result" class="hidden"></div>
                    <div id="settings-actions">
                        <h4>&gt; Maintenance</h4>
                        <div class="action-row">
                            <button id="snapshot-btn" class="btn">Create Snapshot</button>
                            <button id="lint-btn" class="btn">Run Lint</button>
                        </div>
                        <div id="action-status" class="hidden"></div>
                        <div id="snapshots-list"></div>
                    </div>
                    <div id="settings-info">
                        <h4>&gt; System</h4>
                        <div id="status-info"><p>Loading...</p></div>
                    </div>
                </div>
            </aside>

            <!-- Wiki file viewer modal -->
            <div id="wiki-viewer" class="hidden">
                <div id="wiki-viewer-header">
                    <span id="wiki-viewer-title"></span>
                    <button id="wiki-viewer-close" class="btn-sm">X</button>
                </div>
                <div id="wiki-viewer-content"></div>
            </div>
        </main>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
